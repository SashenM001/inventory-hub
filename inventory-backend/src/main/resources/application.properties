spring.application.name=inventory-service
server.port=${PORT:8082}

# Database Configuration (uses Railway env vars with local fallbacks)
spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/dbfms?useSSL=false&serverTimezone=Asia/Colombo&allowPublicKeyRetrieval=true}
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:Kanil12Mysql22_}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${SHOW_SQL:true}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Logging
logging.level.root=INFO
logging.level.com.supremefuneralx=DEBUG

# JWT Configuration
app.jwt.secret=${JWT_SECRET:your-secret-key-change-this-in-production-with-a-strong-key}
app.jwt.expiration=86400000

# CORS Configuration
app.cors.allowedOrigins=${CORS_ORIGINS:http://localhost:8081,http://localhost:3000}
